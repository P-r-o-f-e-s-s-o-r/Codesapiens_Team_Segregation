<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Forge | Smart Team Segregation</title>
    <!-- Google Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Outfit:wght@300;400;600;700&family=Syne:wght@700;800&display=swap');

        :root {
            /* Dark Mode (Default) */
            --bg-deep: #0D1117;
            --bg-panel: rgba(22, 27, 34, 0.7);
            --bg-card: rgba(33, 38, 45, 0.8);
            --text-main: #E6EDF3;
            --text-dim: #8B949E;
            --accent: #2F81F7;
            --accent-glow: rgba(47, 129, 247, 0.3);
            --border: rgba(48, 54, 61, 0.8);
            --glass-blur: 12px;
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            
            --font-display: 'Syne', sans-serif;
            --font-ui: 'Outfit', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        [data-theme="light"] {
            --bg-deep: #F0F2F5;
            --bg-panel: rgba(255, 255, 255, 0.7);
            --bg-card: rgba(255, 255, 255, 0.9);
            --text-main: #1F2328;
            --text-dim: #636C76;
            --accent: #0969DA;
            --accent-glow: rgba(9, 105, 218, 0.1);
            --border: rgba(208, 215, 222, 0.8);
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        [data-theme="high-contrast"] {
            --bg-deep: #000000;
            --bg-panel: #000000;
            --bg-card: #000000;
            --text-main: #FFFFFF;
            --text-dim: #CCCCCC;
            --accent: #FFFF00;
            --accent-glow: rgba(255, 255, 0, 0.2);
            --border: #FFFFFF;
            --glass-blur: 0px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
            transition: background-color var(--transition), color var(--transition);
        }

        /* Typography */
        h1, h2, h3 { font-family: var(--font-display); text-transform: uppercase; letter-spacing: -0.02em; }
        .font-ui { font-family: var(--font-ui); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        .nav-buttons {
            display: flex;
            gap: 0.5rem;
            background: var(--border);
            padding: 3px;
            border-radius: 10px;
        }

        .nav-btn {
            padding: 0.4rem 1rem;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: 7px;
            cursor: pointer;
            transition: var(--transition);
        }

        .nav-btn.active {
            background: var(--bg-card);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* Page States */
        body[data-page="display"] .sidebar {
            display: none;
        }
        
        body[data-page="display"] .main-layout {
            justify-content: center;
        }

        body[data-page="display"] .content-area {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-panel);
            backdrop-filter: blur(var(--glass-blur));
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #8250DF);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-family: var(--font-display);
        }

        .event-title-display {
            font-family: var(--font-display);
            font-size: 1.1rem;
            color: var(--accent);
            max-width: 40%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-stats {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .badge {
            background: var(--border);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: var(--font-ui);
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 340px;
            background: var(--bg-panel);
            backdrop-filter: blur(var(--glass-blur));
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            transition: transform var(--transition);
        }

        .section-title {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Input Modes */
        .mode-toggle {
            display: flex;
            background: var(--border);
            padding: 3px;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }

        .mode-btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: 7px;
            cursor: pointer;
            transition: var(--transition);
        }

        .mode-btn.active {
            background: var(--bg-card);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* Dropzone */
        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(47, 129, 247, 0.03);
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: var(--accent);
            background: rgba(47, 129, 247, 0.08);
        }

        .dropzone-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .dropzone p { font-size: 0.85rem; color: var(--text-dim); }

        /* Manual Input */
        .manual-form {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .input-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            font-family: var(--font-ui);
        }

        input, select, textarea {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: var(--transition);
            width: 100%;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn-add {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font-ui);
            margin-top: 0.5rem;
        }

        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
            max-height: 150px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .chip {
            background: var(--border);
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .chip-remove {
            cursor: pointer;
            opacity: 0.6;
            font-weight: bold;
        }

        .chip-remove:hover { opacity: 1; color: #ff4d4d; }

        /* Controls */
        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--border);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* Main Content */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 3rem 2rem;
            position: relative;
        }

        .event-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .event-header h1 {
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom, var(--text-main), var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .summary-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            font-family: var(--font-ui);
            font-weight: 600;
            color: var(--text-dim);
        }

        /* Team Grid */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            align-items: start;
        }

        .team-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: transform var(--transition), box-shadow var(--transition);
            animation: cardIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .team-card.card-compact { padding: 0.5rem; }
        .team-card.card-compact .team-card-header { padding: 0.5rem 0.75rem; }
        .team-card.card-compact .member-list { padding: 0.5rem 0.75rem; gap: 0.4rem; }
        .team-card.card-compact .member-name { font-size: 0.85rem; }
        .team-card.card-compact .member-meta { display: none; }

        .team-card.card-expanded { padding: 0.5rem; }
        .team-card.card-expanded .team-card-header { padding: 1.5rem; }
        .team-card.card-expanded .member-list { padding: 1.5rem; gap: 1.25rem; }
        .team-card.card-expanded .member-name { font-size: 1.1rem; }
        .team-card.card-expanded .member-meta { font-size: 0.85rem; }

        .team-card-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .team-card-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: var(--team-accent, var(--accent));
        }

        .team-name {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
        }

        .member-list {
            padding: 1rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .member-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .member-index {
            font-family: var(--font-ui);
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 0.2rem;
            width: 1.2rem;
        }

        .member-info {
            display: flex;
            flex-direction: column;
        }

        .member-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .member-meta {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            text-align: center;
            color: var(--text-dim);
        }

        .empty-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            opacity: 0.2;
        }

        /* Actions */
        .actions-container {
            margin-top: auto;
            padding-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #8250DF);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 800;
            font-family: var(--font-display);
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(47, 129, 247, 0.3);
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(47, 129, 247, 0.4);
        }

        .btn-primary:active { transform: scale(0.98); }

        .btn-secondary {
            background: var(--border);
            color: var(--text-main);
            border: none;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 600;
            font-family: var(--font-ui);
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-secondary:hover { background: var(--text-dim); color: var(--bg-deep); }

        .export-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        /* Customization Modal/Panel */
        .custom-panel {
            position: fixed;
            right: -340px;
            top: 0;
            bottom: 0;
            width: 320px;
            background: var(--bg-panel);
            backdrop-filter: blur(var(--glass-blur));
            border-left: 1px solid var(--border);
            z-index: 200;
            padding: 2rem;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }

        .custom-panel.open { right: 0; }

        .custom-toggle-btn {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 100;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar { width: 300px; }
            .event-header h1 { font-size: 2.5rem; }
        }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); overflow-y: visible; }
            .content-area { padding: 2rem 1rem; }
            .teams-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 480px) {
            .teams-grid { grid-template-columns: 1fr; }
            .event-header h1 { font-size: 2rem; }
            .header-stats { display: none; }
        }

        /* Print Styles */
        @media print {
            .sidebar, header, .custom-toggle-btn, .custom-panel, .actions-container, .mode-toggle { display: none !important; }
            body { background: white !important; color: black !important; }
            .app-container, .main-layout, .content-area { height: auto !important; overflow: visible !important; display: block !important; }
            .teams-grid { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 10px !important; }
            .team-card { border: 1px solid #ccc !important; box-shadow: none !important; break-inside: avoid; }
            .event-header h1 { -webkit-text-fill-color: black !important; background: none !important; font-size: 2rem !important; }
        }

        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-deep);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .forge-loader {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--accent);
            letter-spacing: 0.1em;
        }

        /* Utility */
        .hidden { display: none !important; }
        .mt-2 { margin-top: 0.5rem; }
        .mb-4 { margin-bottom: 1rem; }
        .text-center { text-align: center; }
    </style>
</head>
<body data-theme="dark">

<div class="app-container">
    <header>
        <div class="logo-section" style="gap: 0.6rem;">
            <img src="Logoo.jpg" alt="CodeSapiens Logo" style="height: 42px; width: auto; filter: drop-shadow(0 0 8px var(--accent-glow));">
            <div style="display: flex; flex-direction: column; justify-content: center;">
                <div style="font-family: var(--font-display); font-size: 1.3rem; font-weight: 800; line-height: 1; color: var(--text-main); letter-spacing: 0.5px;">CODESAPIENS</div>
                <div style="font-size: 0.55rem; color: var(--text-dim); font-weight: 500; letter-spacing: 0.2px; margin-top: 2px;">THE STUDENT COMMUNITY OF CODERS</div>
            </div>
        </div>
        
        <div class="nav-buttons">
            <button class="nav-btn active" id="navManage">Manage</button>
            <button class="nav-btn" id="navDisplay">Display</button>
        </div>

        <div id="headerEventTitle" class="event-title-display"></div>
        <div class="header-stats">
            <div class="badge" id="totalMembersBadge">0 Members</div>
            <button class="btn-secondary" id="themeToggle" style="padding: 0.4rem 0.6rem; font-size: 0.8rem;">🌓</button>
        </div>
    </header>

    <div class="main-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <!-- Data Input -->
            <section>
                <div class="section-title">
                    <span>Data Input</span>
                    <span class="badge" id="inputCount">0</span>
                </div>
                
                <div class="mode-toggle">
                    <button class="mode-btn active" data-mode="csv">CSV Upload</button>
                    <button class="mode-btn" data-mode="manual">Manual</button>
                </div>

                <div id="csvInputSection">
                    <div class="dropzone" id="dropzone">
                        <span class="dropzone-icon">📁</span>
                        <p>Drag & Drop CSV or <strong>Browse</strong></p>
                        <input type="file" id="fileInput" accept=".csv" class="hidden">
                    </div>
                    <div id="csvPreview" class="mt-2 hidden">
                        <p style="font-size: 0.7rem; color: var(--text-dim);">Preview (First 5 rows):</p>
                        <div style="overflow-x: auto; margin-top: 0.3rem; border: 1px solid var(--border); border-radius: 4px;">
                            <table id="previewTable" style="width: 100%; font-size: 0.65rem; border-collapse: collapse;">
                                <!-- Table content injected by JS -->
                            </table>
                        </div>
                    </div>
                </div>

                <div id="manualInputSection" class="hidden">
                    <div class="manual-form">
                        <div class="input-group">
                            <label>Name *</label>
                            <input type="text" id="manualName" placeholder="e.g. John Doe">
                        </div>
                        <div class="input-group">
                            <label>College / Org</label>
                            <input type="text" id="manualOrg" placeholder="e.g. Stanford">
                        </div>
                        <button class="btn-add" id="addMemberBtn">Add Member</button>
                        <textarea id="bulkPaste" placeholder="Bulk paste names (one per line)..." rows="3" style="margin-top: 0.5rem;"></textarea>
                    </div>
                    <div class="chips-container" id="chipsContainer">
                        <!-- Chips injected by JS -->
                    </div>
                </div>
            </section>

            <!-- Segregation Controls -->
            <section class="controls-panel">
                <div class="section-title">Segregation Controls</div>
                
                <div class="input-group">
                    <label>Event / Game Title</label>
                    <input type="text" id="eventTitleInput" placeholder="Enter Event Name...">
                </div>

                <div class="input-group">
                    <label>Segregation Mode</label>
                    <select id="segMode">
                        <option value="perTeam">Members per Team</option>
                        <option value="numTeams">Number of Teams</option>
                    </select>
                </div>

                <div class="input-group">
                    <label id="segValueLabel">Members per Team</label>
                    <input type="number" id="segValue" min="1" value="2">
                </div>

                <div class="input-group">
                    <label>Remainder Handling</label>
                    <select id="remainderMode">
                        <option value="distribute">Distribute Extras (Round Robin)</option>
                        <option value="finalTeam">Create Smaller Final Team</option>
                        <option value="discard">Discard Remainder</option>
                    </select>
                </div>

                <div class="toggle-row">
                    <label class="font-ui" style="font-size: 0.85rem; font-weight: 600;">Shuffle Members</label>
                    <label class="switch">
                        <input type="checkbox" id="shuffleToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="input-group" id="seedGroup">
                    <label>Random Seed (Optional)</label>
                    <input type="number" id="shuffleSeed" placeholder="Enter seed...">
                </div>

                <div class="toggle-row">
                    <label class="font-ui" style="font-size: 0.85rem; font-weight: 600;">Balance Groups</label>
                    <label class="switch">
                        <input type="checkbox" id="balanceToggle">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="input-group">
                    <label>Team Naming</label>
                    <select id="namingMode">
                        <option value="auto">Auto (Team 1, 2...)</option>
                        <option value="prefix">Custom Prefix</option>

            <!-- Actions -->
            <div class="actions-container">
                <button class="btn-primary" id="generateBtn">GENERATE TEAMS</button>
                <button class="btn-secondary hidden" id="regenerateBtn">REGENERATE / RESHUFFLE</button>
                <div class="export-grid">
                    <button class="btn-secondary" id="resetBtn">RESET ALL</button>
                    <button class="btn-secondary" id="printBtn">PRINT / PDF</button>
                </div>

                    <button class="btn-secondary" id="copyTextBtn">COPY TEXT</button>
                    <button class="btn-secondary" id="downloadCsvBtn">DL CSV</button>
                    <button class="btn-secondary" id="downloadJsonBtn" style="grid-column: span 2;">DL JSON</button>
                </div>

        <!-- Main Content Area -->
        <main class="content-area">
            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="loading-overlay">
                <div class="forge-loader"></div>
                <div class="loading-text">FORGING TEAMS...</div>
            </div>

            <div id="emptyState" class="empty-state">
                <div class="empty-icon">⚔️</div>
                <h3>Ready for Battle?</h3>
                <p>Upload a CSV or add members manually to start forging teams.</p>
            </div>

            <div id="resultsSection" class="hidden">
                <div class="event-header">
                    <h1 id="displayEventTitle">EVENT TITLE</h1>
                    <div class="summary-bar" id="summaryBar">
                        <!-- Summary injected by JS -->
                    </div>
                </div>

                <div class="teams-grid" id="teamsGrid">
                    <!-- Team cards injected by JS -->
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Customization Panel -->
<div class="custom-toggle-btn" id="customToggleBtn">⚙️</div>
<div class="custom-panel" id="customPanel">
    <h3 class="mb-4">Customization</h3>
    
    <div class="input-group mb-4">
        <label>Color Palette</label>
        <select id="paletteSelect">
            <option value="neon">Neon (Vibrant)</option>
            <option value="pastel">Pastel (Soft)</option>
            <option value="earth">Earth (Natural)</option>
            <option value="ocean">Ocean (Cool)</option>
            <option value="mono">Mono (Minimal)</option>
        </select>
    </div>

    <div class="input-group mb-4">
        <label>Card Size</label>
        <select id="cardSizeSelect">
            <option value="compact">Compact</option>
            <option value="standard" selected>Standard</option>
            <option value="expanded">Expanded</option>
        </select>
    </div>

    <div class="input-group mb-4">
        <label>Font Size</label>
        <input type="range" id="fontSizeSlider" min="12" max="20" value="15">
        <div class="toggle-row mt-2">
            <span style="font-size: 0.7rem;">S</span>
            <span style="font-size: 0.7rem;">XL</span>
        </div>
    </div>

    <div class="section-title mt-2">Display Columns</div>
    <div class="toggle-row mb-4">
        <label style="font-size: 0.85rem;">College / Org</label>
        <label class="switch">
            <input type="checkbox" id="showOrg" checked>
            <span class="slider"></span>
        </label>
    </div>
    <div class="toggle-row mb-4">
        <label style="font-size: 0.85rem;">Serial Numbers</label>
        <label class="switch">
            <input type="checkbox" id="showSerial" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="input-group mb-4">
        <label>Border Style</label>
        <select id="borderStyleSelect">
            <option value="solid">Solid</option>
            <option value="dashed">Dashed</option>
            <option value="gradient">Gradient</option>
            <option value="none">None</option>
        </select>
    </div>

    <button class="btn-secondary w-full" id="closeCustomBtn" style="width: 100%;">Close</button>
</div>

<script>
    /**
     * TEAM FORGE - Core Logic
     */

    // --- State Management ---
    const state = {
        members: [], // { name, phone, email, org, group }
        teams: [],
        eventTitle: '',
        currentPage: 'manage', // manage | display
        config: {
            mode: 'csv', // csv | manual
            segMode: 'perTeam', // perTeam | numTeams
            segValue: 2,
            remainderMode: 'distribute', // distribute | finalTeam | discard
            shuffle: true,
            seed: null,
            balance: false,
            namingMode: 'auto', // auto | prefix | custom
            teamPrefix: 'Team',
            customNames: [],
            palette: 'neon',
            cardSize: 'standard',
            fontSize: 15,
            showOrg: true,
            showSerial: true,
            borderStyle: 'solid',
            theme: 'dark'
        }
    };

    // --- Palettes ---
    const palettes = {
        neon: ['#2F81F7', '#8250DF', '#3FB950', '#D29922', '#F85149', '#DB61A2', '#58A6FF', '#79C0FF', '#A371F7', '#56D364', '#E3B341', '#F78166'],
        pastel: ['#AEC6CF', '#FFB347', '#B39EB5', '#FF6961', '#77DD77', '#FDFD96', '#84B6F4', '#FDCAE1', '#C23B22', '#DEA5A4', '#CB99C9', '#779ECB'],
        earth: ['#4B5320', '#8B4513', '#556B2F', '#D2B48C', '#BC8F8F', '#A0522D', '#6B8E23', '#DEB887', '#8FBC8F', '#BDB76B', '#CD853F', '#808000'],
        ocean: ['#0077BE', '#00A86B', '#5F9EA0', '#4682B4', '#00CED1', '#20B2AA', '#B0C4DE', '#48D1CC', '#008B8B', '#00FFFF', '#7FFFD4', '#1E90FF'],
        mono: ['#30363D', '#484F58', '#6E7681', '#8B949E', '#B1BAC4', '#D0D7DE', '#F0F6FC', '#161B22', '#0D1117', '#21262D', '#30363D', '#8B949E']
    };

    // --- PRNG (Mulberry32) ---
    function mulberry32(a) {
        return function() {
            let t = a += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    // --- CSV Parser ---
    function parseCSV(text) {
        const rows = [];
        let currentRow = [];
        let currentField = '';
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const nextChar = text[i + 1];

            if (inQuotes) {
                if (char === '"' && nextChar === '"') {
                    currentField += '"';
                    i++;
                } else if (char === '"') {
                    inQuotes = false;
                } else {
                    currentField += char;
                }
            } else {
                if (char === '"') {
                    inQuotes = true;
                } else if (char === ',') {
                    currentRow.push(currentField.trim());
                    currentField = '';
                } else if (char === '\r' || char === '\n') {
                    currentRow.push(currentField.trim());
                    if (currentRow.some(f => f !== '')) rows.push(currentRow);
                    currentRow = [];
                    currentField = '';
                    if (char === '\r' && nextChar === '\n') i++;
                } else {
                    currentField += char;
                }
            }
        }
        if (currentField || currentRow.length > 0) {
            currentRow.push(currentField.trim());
            if (currentRow.some(f => f !== '')) rows.push(currentRow);
        }
        return rows;
    }

    function mapCSVData(rows) {
        if (rows.length === 0) return [];
        
        let startIndex = 0;
        let headers = rows[0].map(h => h.toLowerCase());
        
        // Check if first row is header
        const commonHeaders = ['name', 'phone', 'email', 'college', 'org', 'group', 'gender'];
        const isHeader = headers.some(h => commonHeaders.some(ch => h.includes(ch)));
        
        if (isHeader) {
            startIndex = 1;
        } else {
            headers = ['name', 'phone', 'email', 'org']; // Default mapping
        }

        const nameIdx = headers.findIndex(h => h.includes('name'));
        const phoneIdx = headers.findIndex(h => h.includes('phone') || h.includes('no'));
        const emailIdx = headers.findIndex(h => h.includes('email'));
        const orgIdx = headers.findIndex(h => h.includes('college') || h.includes('org'));
        const groupIdx = headers.findIndex(h => h.includes('group') || h.includes('gender'));

        const members = [];
        const nameCount = {};

        for (let i = startIndex; i < rows.length; i++) {
            const row = rows[i];
            let name = row[nameIdx !== -1 ? nameIdx : 0] || 'Unknown';
            
            // Handle duplicates
            nameCount[name] = (nameCount[name] || 0) + 1;
            if (nameCount[name] > 1) name += ` (${nameCount[name]})`;

            members.push({
                name: name,
                phone: phoneIdx !== -1 ? row[phoneIdx] : '',
                email: emailIdx !== -1 ? row[emailIdx] : '',
                org: orgIdx !== -1 ? row[orgIdx] : '',
                group: groupIdx !== -1 ? row[groupIdx] : ''
            });
        }
        return members;
    }

    // --- Core Logic Functions ---
    function shuffleArray(array, seed) {
        const rng = seed !== null ? mulberry32(seed) : Math.random;
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(rng() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function segregateTeams() {
        if (state.members.length === 0) return;

        let list = [...state.members];
        if (state.config.shuffle) {
            list = shuffleArray(list, state.config.seed);
        }

        const total = list.length;
        let teamSize, numTeams;

        if (state.config.segMode === 'perTeam') {
            teamSize = parseInt(state.config.segValue);
            numTeams = Math.floor(total / teamSize);
        } else {
            numTeams = parseInt(state.config.segValue);
            teamSize = Math.floor(total / numTeams);
        }

        if (numTeams === 0) numTeams = 1;

        const teams = Array.from({ length: numTeams }, () => []);
        const remainders = [];

        if (state.config.balance) {
            // Group by 'group' field
            const groups = {};
            list.forEach(m => {
                const g = m.group || 'None';
                if (!groups[g]) groups[g] = [];
                groups[g].push(m);
            });

            let teamIdx = 0;
            Object.values(groups).forEach(groupMembers => {
                groupMembers.forEach(m => {
                    if (teamIdx < numTeams * teamSize) {
                        teams[teamIdx % numTeams].push(m);
                        teamIdx++;
                    } else {
                        remainders.push(m);
                    }
                });
            });
        } else {
            // Initial distribution
            let currentIdx = 0;
            for (let i = 0; i < numTeams; i++) {
                for (let j = 0; j < teamSize; j++) {
                    if (currentIdx < total) {
                        teams[i].push(list[currentIdx++]);
                    }
                }
            }
            while (currentIdx < total) {
                remainders.push(list[currentIdx++]);
            }
        }

        if (remainders.length > 0) {
            if (state.config.remainderMode === 'distribute') {
                remainders.forEach((m, i) => {
                    teams[i % numTeams].push(m);
                });
            } else if (state.config.remainderMode === 'finalTeam') {
                teams.push(remainders);
            } else if (state.config.remainderMode === 'discard') {
                console.warn('Discarded members:', remainders.map(m => m.name));
            }
        }

        state.teams = teams;
        renderTeams();
    }

    // --- UI Rendering ---
    function renderTeams() {
        const grid = document.getElementById('teamsGrid');
        const emptyState = document.getElementById('emptyState');
        const resultsSection = document.getElementById('resultsSection');
        const summaryBar = document.getElementById('summaryBar');
        const exportOptions = document.getElementById('exportOptions');

        if (state.teams.length === 0) {
            emptyState.classList.remove('hidden');
            resultsSection.classList.add('hidden');
            exportOptions.style.display = 'none';
            document.getElementById('regenerateBtn').classList.add('hidden');
            return;
        }

        emptyState.classList.add('hidden');
        resultsSection.classList.remove('hidden');
        exportOptions.style.display = 'grid';
        document.getElementById('regenerateBtn').classList.remove('hidden');

        // Update Header
        document.getElementById('displayEventTitle').textContent = state.eventTitle || 'TEAM SEGREGATION';
        document.getElementById('headerEventTitle').textContent = state.eventTitle;
        
        const totalMembers = state.teams.reduce((sum, t) => sum + t.length, 0);
        summaryBar.innerHTML = `
            <span>${totalMembers} Members</span>
            <span>→</span>
            <span>${state.teams.length} Teams</span>
        `;

        grid.innerHTML = '';
        const palette = palettes[state.config.palette];

        state.teams.forEach((team, i) => {
            let teamName = '';
            if (state.config.namingMode === 'auto') {
                teamName = `Team ${i + 1}`;
            } else if (state.config.namingMode === 'prefix') {
                teamName = `${state.config.teamPrefix} ${i + 1}`;
            } else {
                teamName = state.config.customNames[i] || `Team ${i + 1}`;
            }

            const card = document.createElement('div');
            card.className = `team-card card-${state.config.cardSize}`;
            card.style.setProperty('--team-accent', palette[i % palette.length]);
            card.style.animationDelay = `${i * 0.05}s`;
            
            if (state.config.borderStyle === 'dashed') card.style.borderStyle = 'dashed';
            if (state.config.borderStyle === 'none') card.style.border = 'none';
            if (state.config.borderStyle === 'gradient') {
                card.style.borderImage = `linear-gradient(to bottom, ${palette[i % palette.length]}, transparent) 1`;
            }

            let membersHtml = '';
            team.forEach((m, j) => {
                membersHtml += `
                    <div class="member-item" style="font-size: ${state.config.fontSize}px;">
                        ${state.config.showSerial ? `<span class="member-index">${j + 1}</span>` : ''}
                        <div class="member-info">
                            <span class="member-name">${m.name}</span>
                            ${state.config.showOrg && m.org ? `<span class="member-meta">${m.org}</span>` : ''}
                        </div>
                    </div>
                `;
            });

            card.innerHTML = `
                <div class="team-card-header">
                    <span class="team-name">${teamName}</span>
                    <span class="badge">${team.length}</span>
                </div>
                <div class="member-list">
                    ${membersHtml}
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function updateInputCount() {
        const count = state.members.length;
        document.getElementById('inputCount').textContent = count;
        document.getElementById('totalMembersBadge').textContent = `${count} Members`;
        document.getElementById('segValue').max = count || 1;
    }

    function renderChips() {
        const container = document.getElementById('chipsContainer');
        container.innerHTML = '';
        state.members.forEach((m, i) => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.innerHTML = `
                <span>${m.name}</span>
                <span class="chip-remove" onclick="removeMember(${i})">×</span>
            `;
            container.appendChild(chip);
        });
        updateInputCount();
    }

    window.removeMember = (index) => {
        state.members.splice(index, 1);
        renderChips();
    };

    function switchPage(page) {
        state.currentPage = page;
        document.body.setAttribute('data-page', page);
        
        const navManage = document.getElementById('navManage');
        const navDisplay = document.getElementById('navDisplay');
        
        if (page === 'manage') {
            navManage.classList.add('active');
            navDisplay.classList.remove('active');
        } else {
            navManage.classList.remove('active');
            navDisplay.classList.add('active');
        }
    }

    document.getElementById('navManage').addEventListener('click', () => switchPage('manage'));
    document.getElementById('navDisplay').addEventListener('click', () => {
        if (state.teams.length === 0) {
            alert('Generate teams first to view the display page.');
            return;
        }
        switchPage('display');
    });

    // --- Event Listeners ---
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.config.mode = btn.dataset.mode;
            
            if (state.config.mode === 'csv') {
                document.getElementById('csvInputSection').classList.remove('hidden');
                document.getElementById('manualInputSection').classList.add('hidden');
            } else {
                document.getElementById('csvInputSection').classList.add('hidden');
                document.getElementById('manualInputSection').classList.remove('hidden');
            }
        });
    });

    // CSV Upload
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
        if (files.length === 0) return;
        const file = files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const text = e.target.result;
            const rows = parseCSV(text);
            state.members = mapCSVData(rows);
            updateInputCount();
            showCSVPreview(rows);
        };
        reader.readAsText(file);
    }

    function showCSVPreview(rows) {
        const preview = document.getElementById('csvPreview');
        const table = document.getElementById('previewTable');
        preview.classList.remove('hidden');
        
        let html = '';
        rows.slice(0, 6).forEach((row, i) => {
            html += `<tr style="${i === 0 ? 'background: var(--border); font-weight: bold;' : 'border-bottom: 1px solid var(--border);'}">`;
            row.slice(0, 4).forEach(cell => {
                html += `<td style="padding: 4px;">${cell}</td>`;
            });
            html += '</tr>';
        });
        table.innerHTML = html;
    }

    // Manual Input
    document.getElementById('addMemberBtn').addEventListener('click', () => {
        const name = document.getElementById('manualName').value.trim();
        const org = document.getElementById('manualOrg').value.trim();
        if (!name) return;

        state.members.push({ name, org, phone: '', email: '', group: '' });
        document.getElementById('manualName').value = '';
        document.getElementById('manualOrg').value = '';
        renderChips();
    });

    document.getElementById('bulkPaste').addEventListener('input', (e) => {
        const val = e.target.value.trim();
        if (!val) return;
        const names = val.split('\n').map(n => n.trim()).filter(n => n);
        names.forEach(n => {
            state.members.push({ name: n, org: '', phone: '', email: '', group: '' });
        });
        e.target.value = '';
        renderChips();
    });

    // Controls
    document.getElementById('eventTitleInput').addEventListener('input', (e) => {
        state.eventTitle = e.target.value;
    });

    document.getElementById('segMode').addEventListener('change', (e) => {
        state.config.segMode = e.target.value;
        document.getElementById('segValueLabel').textContent = e.target.value === 'perTeam' ? 'Members per Team' : 'Number of Teams';
    });

    document.getElementById('segValue').addEventListener('input', (e) => {
        state.config.segValue = e.target.value;
    });

    document.getElementById('remainderMode').addEventListener('change', (e) => {
        state.config.remainderMode = e.target.value;
    });

    document.getElementById('shuffleToggle').addEventListener('change', (e) => {
        state.config.shuffle = e.target.checked;
        document.getElementById('seedGroup').classList.toggle('hidden', !e.target.checked);
    });

    document.getElementById('shuffleSeed').addEventListener('input', (e) => {
        state.config.seed = e.target.value ? parseInt(e.target.value) : null;
    });

    document.getElementById('namingMode').addEventListener('change', (e) => {
        state.config.namingMode = e.target.value;
        document.getElementById('prefixGroup').classList.toggle('hidden', e.target.value !== 'prefix');
        document.getElementById('customNamesGroup').classList.toggle('hidden', e.target.value !== 'custom');
    });

    document.getElementById('teamPrefix').addEventListener('input', (e) => {
        state.config.teamPrefix = e.target.value;
    });

    document.getElementById('customTeamNames').addEventListener('input', (e) => {
        state.config.customNames = e.target.value.split('\n').map(n => n.trim()).filter(n => n);
    });

    // Generate
    document.getElementById('generateBtn').addEventListener('click', () => {
        if (state.members.length < 1) {
            alert('Please add at least 1 member.');
            return;
        }
        
        const loader = document.getElementById('loadingOverlay');
        loader.classList.add('active');
        
        setTimeout(() => {
            segregateTeams();
            
            // Switch to display page
            switchPage('display');
            
            setTimeout(() => {
                loader.classList.remove('active');
                // Scroll to results
                document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
            }, 500);
        }, 1000);
    });

    // Reset
    document.getElementById('resetBtn').addEventListener('click', () => {
        // Removed confirm() as it can be problematic in some iframe environments
        state.members = [];
        state.teams = [];
        state.eventTitle = '';
        
        // Clear Inputs
        document.getElementById('eventTitleInput').value = '';
        document.getElementById('manualName').value = '';
        document.getElementById('manualOrg').value = '';
        document.getElementById('bulkPaste').value = '';
        document.getElementById('shuffleSeed').value = '';
        document.getElementById('customTeamNames').value = '';
        document.getElementById('fileInput').value = ''; 
        
        // Reset UI
        document.getElementById('displayEventTitle').textContent = 'EVENT TITLE';
        document.getElementById('headerEventTitle').textContent = '';
        document.getElementById('csvPreview').classList.add('hidden');
        document.getElementById('previewTable').innerHTML = '';
        
        switchPage('manage');
        renderChips();
        renderTeams();
        
        // Visual feedback for reset
        const resetBtn = document.getElementById('resetBtn');
        const originalText = resetBtn.textContent;
        resetBtn.textContent = 'RESET DONE!';
        resetBtn.style.color = '#3FB950';
        setTimeout(() => {
            resetBtn.textContent = originalText;
            resetBtn.style.color = '';
        }, 1500);
    });

    // Theme
    document.getElementById('themeToggle').addEventListener('click', () => {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : (current === 'light' ? 'high-contrast' : 'dark');
        body.setAttribute('data-theme', next);
        state.config.theme = next;
    });

    // Customization
    document.getElementById('customToggleBtn').addEventListener('click', () => {
        document.getElementById('customPanel').classList.add('open');
    });

    document.getElementById('closeCustomBtn').addEventListener('click', () => {
        document.getElementById('customPanel').classList.remove('open');
    });

    document.getElementById('paletteSelect').addEventListener('change', (e) => {
        state.config.palette = e.target.value;
        renderTeams();
    });

    document.getElementById('cardSizeSelect').addEventListener('change', (e) => {
        state.config.cardSize = e.target.value;
        renderTeams();
    });

    document.getElementById('fontSizeSlider').addEventListener('input', (e) => {
        state.config.fontSize = e.target.value;
        renderTeams();
    });

    ['showOrg', 'showSerial'].forEach(id => {
        document.getElementById(id).addEventListener('change', (e) => {
            state.config[id] = e.target.checked;
            renderTeams();
        });
    });

    document.getElementById('borderStyleSelect').addEventListener('change', (e) => {
        state.config.borderStyle = e.target.value;
        renderTeams();
    });

    // Exports
    document.getElementById('printBtn').addEventListener('click', () => window.print());

    document.getElementById('copyTextBtn').addEventListener('click', () => {
        let text = `${state.eventTitle || 'Team Segregation'}\n\n`;
        state.teams.forEach((team, i) => {
            const name = state.config.namingMode === 'custom' ? (state.config.customNames[i] || `Team ${i+1}`) : `Team ${i+1}`;
            text += `--- ${name} ---\n`;
            team.forEach((m, j) => {
                text += `${j+1}. ${m.name}${m.org ? ` (${m.org})` : ''}\n`;
            });
            text += '\n';
        });
        navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!'));
    });

    document.getElementById('balanceToggle').addEventListener('change', (e) => {
        state.config.balance = e.target.checked;
    });

    document.getElementById('regenerateBtn').addEventListener('click', () => {
        document.getElementById('generateBtn').click();
    });

    document.getElementById('downloadCsvBtn').addEventListener('click', () => {
        let csv = 'Team,Name,College/Org,Phone,Email\n';
        state.teams.forEach((team, i) => {
            const teamName = state.config.namingMode === 'custom' ? (state.config.customNames[i] || `Team ${i+1}`) : `Team ${i+1}`;
            team.forEach(m => {
                csv += `"${teamName}","${m.name}","${m.org}","${m.phone}","${m.email}"\n`;
            });
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${state.eventTitle || 'teams'}.csv`;
        a.click();
    });

    document.getElementById('downloadJsonBtn').addEventListener('click', () => {
        const data = {
            event: state.eventTitle,
            teams: state.teams.map((team, i) => ({
                name: state.config.namingMode === 'custom' ? (state.config.customNames[i] || `Team ${i+1}`) : `Team ${i+1}`,
                members: team
            }))
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${state.eventTitle || 'teams'}.json`;
        a.click();
    });

</script>
</body>
</html>
